<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Enrollments</title>
    <link rel="stylesheet" href="../css/enrollment.css">
  </head>
  <body>
    <div class="main">
      <header>
      <h1>Enrollments</h1>
    </header>
    <div class="stats">
      <div class="stat-card">
        <h2>13</h2>
        <p>Total Enrollments</p>
      </div>
      <div class="stat-card">
        <h2>4</h2>
        <p>Active Enrollments</p>
      </div>
    </div>
    <div class="enroll-section">
      <h2>Enroll Student</h2>
      <select>
        <option>Student</option>
      </select>

      <select>
        <option>Course</option>
      </select>

      <button>Enroll</button>
    </div>
    <div class="filter-box">
      <select>
        <option>Filter by Student</option>
      </select>

      <select>
        <option>Filter by Course</option>
      </select>
    </div>
    <div class="table-container">
      <table class="course-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Student</th>
            <th>Course</th>
            <th>Date</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>1</td>
            <td>Kishor</td>
            <td>Python</td>
            <td>12/10/2025</td>
            <td>
              <button class="delete-btn">Delete</button>
            </td>
          </tr>
          <tr>
            <td>2</td>
            <td>Manohar</td>
            <td>Java</td>
            <td>17/5/2025</td>
            <td>
              <button class="delete-btn">Delete</button>
            </td>
          </tr>
          <tr>
            <td>3</td>
            <td>Himesh</td>
            <td>Ruby</td>
            <td>25/08/2025</td>
            <td>
              <button class="delete-btn">Delete</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
    </div>
  </body>
</html>
